version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j-rag
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password123
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD", "wget", "-O", "/dev/null", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 10

  streamlit_app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: graph-rag-app
    ports:
      - "8501:8501"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password123
      - OLLAMA_HOST=http://host.docker.internal:11434
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./data:/app/data

  background_ingestion:
    build:
      context: .
      dockerfile: Dockerfile.ingestion
    container_name: graph-rag-ingestion
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password123
    env_file:
      - .env
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./data:/app/data

volumes:
  neo4j_data: